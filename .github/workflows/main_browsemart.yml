# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Vite Frontend to Azure Web App - browsemart-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'   # ✅ Azure supported

      - name: Install & Build Vite App
        working-directory: frontend   # ⭐ FIRST GO INTO FRONTEND
        run: |
          npm install
          npm run build

      - name: Upload Vite build (dist)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist        # ⭐ VITE OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Vite build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A34142923DF54880919ED05F1CBC50E3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B850CE3DFE594AF99073CAF2A605D186 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B57BC8550787428AB1B5B6C0AC48C2BE }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: browsemart-frontend
          slot-name: Production
          package: .    # "." == frontend/dist
